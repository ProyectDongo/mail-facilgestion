services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - mail_postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - .:/app
      - mail_static:/app/staticfiles
    entrypoint: ./entrypoint.sh
    command: gunicorn mailsite.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 120
    deploy:
      resources:
        limits:
          memory: 256M

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A mailsite worker -l info --concurrency=1 --max-tasks-per-child=10
    deploy:
      resources:
        limits:
          memory:  384M

  beat:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A mailsite beat -l info --schedule=/app/celerybeat-schedule
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mail_postgres:
  mail_static: